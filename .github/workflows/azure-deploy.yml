name: Deploy to Azure App Service

on:
  push:
    branches:
      - main
  workflow_dispatch: {}

env:
  AZURE_WEBAPP_NAME: ${{ vars.AZURE_WEBAPP_NAME }}

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20.x"

      # Installed here only to verify the build/lint succeed before deploying.
      # The deployed package excludes node_modules/.next below: native modules
      # like better-sqlite3 must be built by Azure's Oryx build (which runs on
      # the same base image as the runtime) rather than on this runner, whose
      # glibc version doesn't match Azure's App Service Linux container.
      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Verify build
        run: npm run build

      - name: Remove build artifacts before deploy
        run: rm -rf node_modules .next

      - name: Deploy to Azure Web App
        uses: azure/webapps-deploy@v3
        with:
          app-name: ${{ env.AZURE_WEBAPP_NAME }}
          publish-profile: ${{ secrets.AZURE_WEBAPP_PUBLISH_PROFILE }}
          package: .
