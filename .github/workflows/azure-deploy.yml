name: Deploy to Azure App Service

on:
  push:
    branches:
      - main
  workflow_dispatch: {}

env:
  AZURE_WEBAPP_NAME: ${{ vars.AZURE_WEBAPP_NAME }}

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    # Build inside the same base image Azure App Service uses at runtime
    # (NODE|20-lts). Native modules like better-sqlite3 must be compiled
    # against the target's glibc — building on ubuntu-latest directly
    # produced a binary that crashed at runtime (GLIBC_2.38 not found).
    # Building here also keeps Azure's F1 free-tier CPU quota from being
    # spent on the build itself (Oryx running npm install/next build on
    # the App Service container exhausted the whole daily quota).
    # mcr.microsoft.com/v2/appsvc/node/tags/list has no floating "20-lts"
    # tag, only dated ones — bump this periodically to pick up patches.
    container: mcr.microsoft.com/appsvc/node:20-lts_20260710.8.tuxprod
    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Build
        run: npm run build

      - name: Prune dev dependencies
        run: npm prune --omit=dev

      - name: Deploy to Azure Web App
        uses: azure/webapps-deploy@v3
        with:
          app-name: ${{ env.AZURE_WEBAPP_NAME }}
          publish-profile: ${{ secrets.AZURE_WEBAPP_PUBLISH_PROFILE }}
          package: .
