name: Deploy to Azure App Service

on:
  push:
    branches:
      - main
  workflow_dispatch: {}

env:
  AZURE_WEBAPP_NAME: ${{ vars.AZURE_WEBAPP_NAME }}

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    # Native modules like better-sqlite3 must be compiled against a glibc
    # no newer than Azure's runtime — building on ubuntu-latest (glibc
    # 2.39) produced a binary that crashed at runtime (GLIBC_2.38 not
    # found). Azure's actual runtime image (mcr.microsoft.com/appsvc/node)
    # is a minimal image with no build toolchain (no `make`), so we can't
    # build inside it directly. Debian 11 (glibc 2.31, comfortably older)
    # with Node's official build tools included is a safe, well-known
    # substitute. Building here also keeps Azure's F1 free-tier CPU quota
    # from being spent on the build itself (Oryx running npm install/next
    # build on the App Service container exhausted the whole daily quota).
    container: node:20-bullseye
    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Build
        run: npm run build

      - name: Prune dev dependencies
        run: npm prune --omit=dev

      - name: Deploy to Azure Web App
        uses: azure/webapps-deploy@v3
        with:
          app-name: ${{ env.AZURE_WEBAPP_NAME }}
          publish-profile: ${{ secrets.AZURE_WEBAPP_PUBLISH_PROFILE }}
          package: .
